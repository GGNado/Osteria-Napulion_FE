<div class="stats-row" id="stats-cards">
    <div class="stat-card stat-booked">
        <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
                <line x1="10" y1="14" x2="14" y2="14" />
            </svg>
        </div>
        <div class="stat-content">
            <span class="stat-label">TAVOLI PRENOTATI</span>
            <span class="stat-value">{{ stats().tavoliPrenotati }}</span>
        </div>
    </div>
    <div class="stat-card stat-free">
        <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
        </div>
        <div class="stat-content">
            <span class="stat-label">TAVOLI LIBERI</span>
            <span class="stat-value">{{ stats().tavoliLiberi }}</span>
        </div>
    </div>
</div>
