<header class="admin-header" id="admin-header">
    <div class="header-left">
        <h1 class="header-title">Dashboard Gestione Prenotazioni</h1>
        <p class="header-date">{{ formattedDate }}</p>
    </div>
    <div class="header-right">
        <button class="btn btn-primary header-cta" id="quick-booking-btn">
            <span>+</span> Prenotazione Rapida
        </button>
        <div class="header-icons">
            <button class="icon-btn" id="notifications-btn" aria-label="Notifiche">🔔</button>
            <button class="icon-btn" id="settings-btn" aria-label="Impostazioni">⚙️</button>
            <button class="avatar-btn" id="profile-btn" aria-label="Profilo">
                <span class="avatar-circle">AN</span>
            </button>
        </div>
    </div>
</header>
